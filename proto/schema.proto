syntax = "proto3";
package schema;

service SchemaService {
    rpc RegisterNodeType         (NodeTypeSpec)         returns (NodeTypeResponse);
    rpc RegisterCompactEdgeType  (CompactEdgeTypeSpec)  returns (EdgeTypeResponse);
    rpc RegisterProperty         (PropertySpec)         returns (PropertyResponse);
    rpc FinalizeSchema           (FinalizeRequest)      returns (FinalizeResponse);
    rpc GetSchema                (GetSchemaRequest)     returns (GetSchemaResponse);
    rpc GetMemoryUsage           (GetMemoryUsageRequest) returns (GetMemoryUsageResponse);
    // Remove an edge type from the live schema and drop all edges of that type.
    rpc RemoveEdgeType           (RemoveEdgeTypeRequest) returns (RemoveEdgeTypeResponse);
}

// How external IDs for this node type are stored and hashed.
// NUMERIC (default, 0): external_id is parsed as u64 — saves ~28 B/node vs Str.
// STRING  (1):          external_id is stored as Arc<str> — use when IDs are not pure integers.
enum ExternalIdKind {
    EXTERNAL_ID_KIND_NUMERIC = 0;
    EXTERNAL_ID_KIND_STRING  = 1;
}

message NodeTypeSpec {
    string         name        = 1;
    // Omitting this field defaults to NUMERIC (the proto3 zero value).
    ExternalIdKind ext_id_kind = 2;
}

// Compact edge type (uses UpsertEdge, one payload per unique pair).
// Slim (16B) when field_schema absent; Full (36B) when field_schema present.
// Static (8B) when minimal_payload = true.
message CompactEdgeTypeSpec {
    string name            = 1;
    string from_node_type  = 2;
    string to_node_type    = 3;
    uint64 state_ttl_secs  = 4;  // 0 = permanent

    reserved 5;  // formerly: repeated FlagDef flag_schema

    // Schema for interpreting the compact payload (bin boundaries, tracked property).
    optional CompactFieldSchema field_schema = 6;

    // Per-node timed histogram configuration.
    optional NodeHistogramConfig node_histogram = 7;

    // Sliding activity bitmap config — always enabled; tick_size_secs sets granularity.
    // Defaults to 3600s (1 hour) if not specified.
    ActivityBitmapConfig activity_bitmap = 8;

    // If true: 8-byte payload (f32 value + u32 last_seen only).
    // No activity bitmap, no bins, no tx_count. Ignores field_schema if set.
    // Ideal for computed/derived edges (e.g. SIMILAR_TO). Defaults to false.
    bool minimal_payload = 9;

    // Optional single boolean property name for this edge type.
    // When set, bit 63 of the flags field stores the boolean value — zero extra memory.
    // Cannot be used with minimal_payload = true (static edge types have no flags field).
    // Empty string = no boolean property.
    string bool_property = 10;

    // If true, edges are undirected: upserts normalize to (min(src,dst), max(src,dst))
    // storing one canonical payload row per pair. Neighbor queries return out ∪ in neighbors.
    // Requires from_node_type == to_node_type. Defaults to false.
    bool symmetric = 11;
}

message ActivityBitmapConfig {
    uint64 tick_size_secs = 1;
}

message CompactFieldSchema {
    // 7 thresholds defining 8 bins. Values below boundaries[0] → bin 0.
    // Values >= boundaries[6] → bin 7.
    repeated float bin_boundaries = 1;
    // Name of the numeric property driving bin assignment (e.g. "amount").
    string tracked_property = 2;
}

message NodeHistogramConfig {
    bool   enabled_for_src = 1;
    bool   enabled_for_dst = 2;
    uint32 hourly_slots    = 3;  // default 48
    uint32 daily_slots     = 4;  // default 30
}

message PropertySpec {
    string name            = 1;
    string owner_type_name = 2;
    bool   owner_is_node   = 3;
    ValueType value_type   = 4;
}

enum ValueType {
    VALUE_TYPE_INT       = 0;
    VALUE_TYPE_FLOAT     = 1;
    VALUE_TYPE_TIMESTAMP = 2;
    VALUE_TYPE_STRING    = 3;
    VALUE_TYPE_BOOL      = 4;
}

message FinalizeRequest {}

message GetSchemaRequest {}

message NodeTypeInfo {
    uint32         id          = 1;
    string         name        = 2;
    ExternalIdKind ext_id_kind = 3;
}

message EdgeTypeInfo {
    uint32 id             = 1;
    string name           = 2;
    string from_node_type = 3;
    string to_node_type   = 4;
    uint64 state_ttl_secs = 5;
    // Seconds per tick for the mandatory 21-tick activity bitmap on this edge type.
    uint64 tick_size_secs = 6;
    // The name of the single boolean property stored in bit 63 of flags, or empty if none.
    string bool_property  = 7;
    // True when this edge type was registered as symmetric (undirected).
    bool is_symmetric     = 8;
}

message PropertyInfo {
    string name            = 1;
    string owner_type_name = 2;
    bool   owner_is_node   = 3;
    ValueType value_type   = 4;
}

message GetSchemaResponse {
    uint32 schema_version = 1;
    repeated NodeTypeInfo node_types  = 2;
    repeated EdgeTypeInfo edge_types  = 3;
    repeated PropertyInfo properties  = 4;
}

message NodeTypeResponse {
    uint32 node_type_id = 1;
}

message EdgeTypeResponse {
    uint32 edge_type_id = 1;
}

message PropertyResponse {
    uint32 property_id = 1;
}

message FinalizeResponse {
    uint32 schema_version = 1;
    // Memory estimate provided after finalization.
    optional MemoryEstimate memory_estimate = 2;
}

message MemoryEstimate {
    uint64 total_bytes          = 1;
    uint64 nodes_bytes          = 2;
    uint64 compact_store_bytes  = 3;
    uint64 histogram_bytes      = 4;
    uint64 runtime_bytes        = 5;
    string breakdown_text       = 6;
}

message GetMemoryUsageRequest {}

message GetMemoryUsageResponse {
    MemoryEstimate estimate = 1;
    uint64 node_count       = 2;
    uint64 compact_pair_count = 3;
}

message RemoveEdgeTypeRequest {
    string name = 1;
}

message RemoveEdgeTypeResponse {
    // The numeric ID of the edge type that was removed.
    uint32 edge_type_id   = 1;
    // How many edge pairs were dropped from the in-memory store.
    uint64 pairs_dropped  = 2;
}
