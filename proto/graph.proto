syntax = "proto3";
package graph;

service GraphService {
    rpc CreateNode       (CreateNodeRequest)   returns (CreateNodeResponse);
    rpc ListNodes        (ListNodesRequest)    returns (ListNodesResponse);
    // Compact edge type write: create or update a relationship edge.
    rpc UpsertEdge       (UpsertEdgeRequest)   returns (UpsertEdgeResponse);
    // Compact edge type read: get current payload for a specific pair.
    rpc GetEdgeState     (GetEdgeStateRequest) returns (GetEdgeStateResponse);
    rpc UpdateNode       (UpdateNodeRequest)   returns (UpdateResponse);
    rpc DeleteNode       (DeleteNodeRequest)   returns (DeleteResponse);
    rpc GetNode          (GetNodeRequest)      returns (NodeResponse);
    rpc GetNeighbors     (NeighborQuery)       returns (NeighborResponse);
    rpc GetNeighborCount (CountQuery)          returns (CountResponse);
    // Neighbor with max last_seen; optional exclude for impossible-travel (e.g. current IP).
    rpc GetLastNeighbor  (LastNeighborQuery)   returns (LastNeighborResponse);
    // Best-effort transaction ingest: ensure nodes and upsert edges in one request.
    rpc IngestTransaction (IngestTransactionRequest) returns (IngestTransactionResponse);
}

message NodeRef {
    oneof identifier {
        uint64 node_id    = 1;
        ExternalRef external = 2;
    }
}

message ExternalRef {
    string node_type_name = 1;
    string external_id    = 2;
}

message PropertyValue {
    oneof value {
        int64  int_val       = 1;
        double float_val     = 2;
        int64  timestamp_val = 3;
        string string_val    = 4;
        bool   bool_val      = 5;
    }
}

message PropertyEntry {
    string         name  = 1;
    PropertyValue  value = 2;
}

message CreateNodeRequest {
    string               node_type_name = 1;
    optional string      external_id    = 2;
    repeated PropertyEntry properties   = 3;
}

message CreateNodeResponse {
    uint64 node_id = 1;
    bool   created = 2;  // true if newly created; false if idempotent (external_id existed)
}

message UpdateNodeRequest {
    NodeRef              node   = 1;
    repeated PropertyEntry props = 2;
}

message UpdateResponse {}
message DeleteResponse {}

message DeleteNodeRequest {
    NodeRef node = 1;
}

message GetNodeRequest {
    NodeRef node = 1;
}

message NodeResponse {
    uint64               node_id       = 1;
    string               node_type     = 2;
    optional string      external_id   = 3;
    repeated PropertyEntry properties  = 4;
}

message EdgeFilter {
    optional int64 min_created_at_us = 1;
    optional int64 max_created_at_us = 2;
    repeated PropertyPredicate property_filters = 3;
}

message PropertyPredicate {
    string property_name = 1;
    oneof predicate {
        int64  int_gt    = 2;
        int64  int_lt    = 3;
        int64  int_eq    = 4;
        int64  ts_after  = 5;
        int64  ts_before = 6;
        double float_gt  = 7;
        double float_lt  = 8;
        string string_eq = 9;
        bool   bool_eq   = 10;
    }
}

message NeighborQuery {
    NodeRef            node          = 1;
    string             edge_type     = 2;
    bool               out_neighbors = 3;
    optional EdgeFilter filter       = 4;
    uint32             limit         = 5;   // 0 = unlimited (default)
    uint64             cursor        = 6;   // neighbor_node_id after which to resume; 0 = start
    // Filter on neighbor node properties (applied server-side before returning results).
    repeated PropertyPredicate neighbor_filters = 7;
    // When true, include neighbor node properties in the response.
    bool               include_neighbor_props = 8;
}

message NeighborEdge {
    uint64 neighbor_node_id = 1;
    uint64 edge_id          = 2;
    int64  created_at_us    = 3;
    repeated PropertyEntry edge_props         = 4;
    string                 neighbor_node_type = 5;
    optional string        neighbor_external_id = 6;
    repeated PropertyEntry neighbor_props     = 7;
}

message NeighborResponse {
    repeated NeighborEdge edges    = 1;
    bool                  has_more = 2;   // true if more results exist
}

message CountQuery {
    NodeRef node      = 1;
    string  edge_type = 2;
}

message CountResponse {
    uint64 count = 1;
    bool   approximate = 2;
}

message LastNeighborQuery {
    NodeRef node = 1;
    string  edge_type = 2;
    optional NodeRef exclude_neighbor = 3;
}

message LastNeighborResponse {
    bool   found = 1;
    uint64 neighbor_node_id = 2;
    uint32 last_seen_secs = 3;
}

// ---------------------------------------------------------------------------
// Transaction ingest (best-effort)
// ---------------------------------------------------------------------------

message TransactionNode {
    // Optional logical key used by edges in the same request.
    string request_node_key = 1;
    string node_type_name   = 2;
    string external_id      = 3;
    repeated PropertyEntry properties = 4;
}

message TransactionNodeRef {
    oneof reference {
        // Standard node ref (NodeId or external).
        NodeRef node = 1;
        // Reference a node declared in `IngestTransactionRequest.nodes` by key.
        string request_node_key = 2;
    }
}

message TransactionEdge {
    // Optional logical key returned back in edge results.
    string request_edge_key = 1;
    string edge_type_name   = 2;
    TransactionNodeRef src  = 3;
    TransactionNodeRef dst  = 4;
    optional float numeric_value  = 5;
    optional uint32 event_ts_secs = 6;
    optional bool bool_property_value = 7;
}

message IngestTransactionRequest {
    // Optional caller-provided transaction identifier for traceability.
    string transaction_id = 1;
    repeated TransactionNode nodes = 2;
    repeated TransactionEdge edges = 3;
}

message NodeIngestResult {
    uint32 index = 1;
    string request_node_key = 2;
    uint64 node_id = 3;
    bool created = 4;
    optional string error = 5;
}

message EdgeIngestResult {
    uint32 index = 1;
    string request_edge_key = 2;
    bool created_new = 3;
    CompactEdgePayloadProto payload = 4;
    optional string error = 5;
}

message IngestTransactionResponse {
    string transaction_id = 1;
    uint32 nodes_created  = 2;
    uint32 nodes_existing = 3;
    uint32 node_errors    = 4;
    uint32 edges_created  = 5;
    uint32 edges_updated  = 6;
    uint32 edge_errors    = 7;
    repeated NodeIngestResult node_results = 8;
    repeated EdgeIngestResult edge_results = 9;
}

// ---------------------------------------------------------------------------
// ListNodes — query all nodes with external IDs registered in the engine
// ---------------------------------------------------------------------------

message ListNodesRequest {
    // Optional filter: only return nodes of this type.
    // Empty string = return all node types.
    string node_type_filter = 1;
    // Optional substring filter on external_id.
    string external_id_filter = 2;
    // Max results (0 = unlimited).
    uint32 limit = 3;
}

message NodeSummary {
    uint64 node_id    = 1;
    string node_type  = 2;
    string external_id = 3;
}

message ListNodesResponse {
    repeated NodeSummary nodes = 1;
    uint32 total_count = 2;
}

// ---------------------------------------------------------------------------
// Compact edge type messages
// ---------------------------------------------------------------------------

message UpsertEdgeRequest {
    string edge_type_name   = 1;
    NodeRef src             = 2;
    NodeRef dst             = 3;
    reserved 4, 5;  // formerly: flag_set_mask, flag_clear_mask
    // Value of the tracked numeric property (e.g. transaction amount).
    optional float numeric_value  = 6;
    // Event timestamp in epoch seconds. If absent, server time is used.
    optional uint32 event_ts_secs = 7;
    // Value of the edge-type's single boolean property (bit 63 of flags).
    // Ignored if the edge type has no bool_property defined in its schema.
    optional bool bool_property_value = 8;
}

message UpsertEdgeResponse {
    // True if this call created a new relationship pair; false if it updated an existing one.
    bool created_new = 1;
    // Snapshot of the payload after the update.
    CompactEdgePayloadProto payload = 2;
}

message CompactEdgePayloadProto {
    // Activity bitmap raw value (bits 0-62 only; bit 63 is separated into bool_flag below).
    uint64 flags      = 1;
    // Bin counts 0–7 as 16 bytes: each bin is a little-endian u16, max 65 535.
    // Zeros for slim (non-numeric) edge types.
    bytes  bins       = 2;
    // Approximate sum of the tracked numeric property; 0.0 for slim edge types.
    float  approx_sum = 3;
    uint32 tx_count   = 4;
    uint32 last_seen  = 5;
    reserved 6;  // formerly: repeated string active_flag_names
    // The value of the edge-type's single boolean property (bit 63 of internal flags).
    // Present only when the edge type has a bool_property defined in its schema.
    optional bool bool_flag = 7;
}

message GetEdgeStateRequest {
    string  edge_type_name = 1;
    NodeRef src            = 2;
    NodeRef dst            = 3;
    // Optional: filter by tracked numeric value. Returns filtered_count and filtered_approx_sum.
    // min_value: bins >= threshold. max_value: bins <= threshold. Both: range.
    optional float min_value = 4;
    optional float max_value = 5;
    // For activity-bitmap edge types: query time (epoch secs) and windows to compute counts.
    optional uint32 query_time_secs = 6;
    repeated uint64 activity_windows_secs = 7;
}

message GetEdgeStateResponse {
    bool found             = 1;
    CompactEdgePayloadProto payload = 2;
    // When min_value/max_value set: count and estimated sum for events in filtered bins.
    uint32 filtered_count     = 3;
    float  filtered_approx_sum = 4;
    // When activity_bitmap + query_time_secs + activity_windows_secs: tx count per window.
    repeated uint32 activity_counts = 5;
}

